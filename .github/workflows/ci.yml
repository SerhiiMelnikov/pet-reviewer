name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build

  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run pet-reviewer (advisory)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx tsx src/index.ts --agent --provider claude \
            --model claude-haiku-4-5-20251001 \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            > review-output.txt 2>&1 || true
          cat review-output.txt
      - name: Post findings as a PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## 🤖 pet-reviewer (Claude haiku — advisory)"
            echo ""
            echo '```'
            cat review-output.txt
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file comment.md --edit-last --create-if-none
