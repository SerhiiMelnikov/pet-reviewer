name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build

  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run pet-reviewer (advisory, JSON)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx tsx src/index.ts --agent --provider claude \
            --model claude-haiku-4-5-20251001 \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            --json > findings.json 2> review.log || true
          cat review.log || true
      - name: Post inline review comments
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pet-reviewer -->";
            const emoji = { critical: "🔴", warning: "🟡", nit: "🔵" };
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            let review;
            try {
              review = JSON.parse(fs.readFileSync("findings.json", "utf8"));
            } catch {
              review = null;
            }

            // Remove our previous inline comments + summary so re-runs don't pile up.
            const prior = await github.paginate(github.rest.pulls.listReviewComments, {
              owner, repo, pull_number: pr.number,
            });
            for (const c of prior) {
              if (c.body && c.body.includes(marker)) {
                await github.rest.pulls.deleteReviewComment({ owner, repo, comment_id: c.id });
              }
            }
            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pr.number,
            });
            for (const c of issueComments) {
              if (c.body && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }

            if (!review || !Array.isArray(review.findings)) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body: `## 🤖 pet-reviewer\n\nThe review did not produce parseable output.\n\n${marker}`,
              });
              return;
            }

            const formatFinding = (f) =>
              `${emoji[f.severity] || "•"} **[${f.category}]** ${f.message}` +
              (f.suggestion ? `\n\n↳ ${f.suggestion}` : "") +
              `\n\n${marker}`;

            const leftovers = [];
            for (const f of review.findings) {
              if (f.line == null) { leftovers.push(f); continue; }
              try {
                await github.rest.pulls.createReviewComment({
                  owner, repo, pull_number: pr.number, commit_id: pr.head.sha,
                  path: f.file, line: f.line, side: "RIGHT", body: formatFinding(f),
                });
              } catch {
                leftovers.push(f); // line not in the diff (422) etc.
              }
            }

            const total = review.findings.length;
            const lines = leftovers.map(
              (f) => `- ${emoji[f.severity] || "•"} \`${f.file}:${f.line ?? "?"}\` [${f.category}] ${f.message}`,
            );
            const summary =
              `## 🤖 pet-reviewer (Claude haiku — advisory)\n\n` +
              `${total} finding(s); ${total - leftovers.length} posted inline.` +
              (lines.length ? `\n\n**Not anchored to a diff line:**\n${lines.join("\n")}` : "") +
              `\n\n${marker}`;
            await github.rest.issues.createComment({
              owner, repo, issue_number: pr.number, body: summary,
            });
